name: AI SR SKILLS

on:
  pull_request_target:
    branches:
      - main
      - "branch*"
    types:
      - opened
      - reopened

concurrency:
  group: AI-SR-SKILLS-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write

jobs:
  assign-reviewer:
    runs-on: [self-hosted, normal]
    continue-on-error: true
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    if: >
      github.event.action == 'opened' &&
      !startsWith(github.head_ref, 'mergify/')
    steps:
      - name: Assign PR Reviewer
        run: |
          /home/disk1/nas/tools/claude -p "/starrocks-assign-pr-reviewer https://github.com/${{ github.repository }}/pull/${{ github.event.number }}" || true

